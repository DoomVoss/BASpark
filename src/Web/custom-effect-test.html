<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; overflow: hidden; pointer-events: none; }
        html, body { width: 100%; height: 100%; background: transparent !important; }
        canvas { position: fixed; left: 0; top: 0; width: 100%; height: 100%; }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <script>
        const canvas = document.getElementById("c");
        const ctx = canvas.getContext("2d");
        const particles = [];
        const trail = [];
        let isDown = false;
        let alwaysTrail = false;

        function resize() {
            const dpr = window.devicePixelRatio || 1;
            canvas.width = Math.max(1, Math.floor(window.innerWidth * dpr));
            canvas.height = Math.max(1, Math.floor(window.innerHeight * dpr));
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }
        window.addEventListener("resize", resize);
        resize();

        function spawn(x, y, kind) {
            const n = kind === "click" ? 12 : 1;
            for (let i = 0; i < n; i++) {
                const a = Math.random() * Math.PI * 2;
                const sp = kind === "click" ? 2 + Math.random() * 5 : 0;
                particles.push({
                    x, y,
                    vx: Math.cos(a) * sp,
                    vy: Math.sin(a) * sp,
                    life: kind === "click" ? 28 : 18,
                    max: kind === "click" ? 28 : 18,
                    r: kind === "click" ? 4 + Math.random() * 6 : 3,
                    color: kind === "click" ? "255,80,180" : "80,255,160"
                });
            }
            if (kind === "trail") {
                trail.push({ x, y, life: 24, max: 24 });
                if (trail.length > 20) trail.shift();
            }
        }

        function onDown(x, y) {
            isDown = true;
            spawn(x, y, "click");
        }

        function onMove(x, y) {
            if (!isDown && !alwaysTrail) return;
            spawn(x, y, "trail");
        }

        function onUp() {
            isDown = false;
        }

        window.addEventListener("mousedown", (e) => onDown(e.clientX, e.clientY));
        window.addEventListener("mousemove", (e) => onMove(e.clientX, e.clientY));
        window.addEventListener("mouseup", () => onUp());

        let lastBoomX = -1, lastBoomY = -1, lastBoomTime = 0;
        let lastMoveX = -1, lastMoveY = -1;

        window.setInputContext = (mode, alwaysTrailEnabled) => {
            alwaysTrail = mode === "mouse" && Boolean(alwaysTrailEnabled);
        };
        window.setInputContext("mouse", false);

        window.externalBoom = (px, py) => {
            const now = Date.now();
            if (px === lastBoomX && py === lastBoomY && now - lastBoomTime < 25) return;
            lastBoomX = px; lastBoomY = py; lastBoomTime = now;
            onDown(px * window.innerWidth, py * window.innerHeight);
        };

        window.externalMove = (px, py) => {
            if (px === lastMoveX && py === lastMoveY) return;
            lastMoveX = px; lastMoveY = py;
            onMove(px * window.innerWidth, py * window.innerHeight);
        };

        window.externalUp = () => onUp();

        function tick() {
            ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

            for (let i = trail.length - 1; i >= 0; i--) {
                const t = trail[i];
                t.life--;
                const a = t.life / t.max;
                ctx.beginPath();
                ctx.arc(t.x, t.y, 6 * a + 2, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(80,255,160,${a * 0.35})`;
                ctx.fill();
                if (t.life <= 0) trail.splice(i, 1);
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.08;
                p.life--;
                const a = p.life / p.max;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r * a, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${p.color},${a})`;
                ctx.fill();
                if (p.life <= 0) particles.splice(i, 1);
            }

            requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);
    </script>
</body>
</html>
