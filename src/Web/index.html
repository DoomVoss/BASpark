<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; overflow: hidden; pointer-events: none; }
        body, html { 
            width: 100%; height: 100%; 
            background: transparent !important;
        }
        canvas { position: fixed; left: 0; top: 0; width: 100%; height: 100%; }
    </style>
</head>
<body>
    <canvas id="sparkCanvas"></canvas>
<script>
class MouseSpark {
    constructor(opts = {}) {
        this.color = opts.color || '45,175,255'; 
        this.scale = opts.scale || 1.5;
        this.opacity = opts.opacity || 1.0;
        this.speed = opts.speed || 1.0;
        this.maxTrail = opts.maxTrail || 16;

        this.sparkPool = [];
        this.wavePool = [];

        this.waves = [];
        this.sparks = [];
        this.trail = [];
        this.touchPointers = new Map(); // 多指追踪: pointerId -> { trail: [], isDown: bool, lastPos: null }
        this.isDown = false;
        this.lastPos = null;
        this.baseFrameMs = 1000 / 60;
        this.maxDeltaMs = 100;
        this.lastFrameTime = performance.now();

        this.initCanvas();
        this.bindEvents();
        requestAnimationFrame((now) => this.loop(now));
    }

    alpha(value) {
        return Math.max(0, Math.min(1, value * this.opacity));
    }

    initCanvas() {
        this.c = document.getElementById("sparkCanvas");
        this.ctx = this.c.getContext("2d");
        this.resize();
        window.addEventListener("resize", () => this.resize());
    }

    resize() {
        let dpr = window.devicePixelRatio || 1;
        this.c.width = window.innerWidth * dpr;
        this.c.height = window.innerHeight * dpr;
        this.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    bindEvents() {
        const getPos = (e) => ({ x: e.clientX, y: e.clientY });
        const dist = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);

        window.addEventListener("mousedown", e => {
            this.isDown = true;
            this.lastPos = getPos(e);
            this.boom(this.lastPos.x, this.lastPos.y);
        });

        window.addEventListener("mousemove", e => {
            if (!this.isDown && !window.effectiveAlwaysTrail) return;
            const p = getPos(e);
            if (!this.lastPos) this.lastPos = p;
            
            if (this.lastPos && dist(p, this.lastPos) > 2) {
                this.trail.push({ x: p.x, y: p.y, life: 1 });
                this.lastPos = p;
                if (this.trail.length > this.maxTrail) this.trail.shift();
                
                if (Math.random() < 0.3) {
                    let a = Math.random() * Math.PI * 2;
                    let speedAdjust = this.scale / 1.5;
                    this.sparks.push({
                        x: p.x + Math.cos(a) * 10 * this.scale, 
                        y: p.y + Math.sin(a) * 10 * this.scale,
                        vx: Math.cos(a) * 1.3 * speedAdjust, 
                        vy: Math.sin(a) * 1.3 * speedAdjust,
                        rot: Math.random() * Math.PI * 2,
                        rs: 0.16,
                        s: 9 * this.scale,
                        a: 0.7,
                        f: 0.95
                    });
                }
            }
        });

        window.addEventListener("mouseup", () => this.isDown = false);
    }

    boom(x, y) {
        // 优化：使用对象池
        let wave;
        if (this.wavePool.length > 0) {
            wave = this.wavePool.pop();
            wave.x = x;
            wave.y = y;
            wave.life = 0;
            wave.max = 18;
            wave.r = 0;
            wave.ring.ang = Math.random() * Math.PI * 2;
            wave.ring.life = 0;
        } else {
            wave = {
                x, y, life: 0, max: 18, r: 0,
                ring: {
                    ang: Math.random() * Math.PI * 2,
                    segs: [
                        { off: -0.25 * Math.PI, len: 1.15 * Math.PI },
                        { off:  0.00 * Math.PI, len: 1.15 * Math.PI },
                        { off:  0.25 * Math.PI, len: 1.15 * Math.PI }
                    ],
                    life: 0, maxLife: 30, rs: 0.08
                }
            };
        }
        this.waves.push(wave);

        let particleCount = 4;
        let speedAdjust = this.scale / 1.5;
        for (let i = 0; i < particleCount; i++) {
            let a = Math.random() * Math.PI * 2;
            let speed = (4.8 + Math.random() * 2) * speedAdjust; 

            let spark;
            if (this.sparkPool.length > 0) {
                spark = this.sparkPool.pop();
                spark.x = x;
                spark.y = y;
                spark.vx = Math.cos(a) * speed;
                spark.vy = Math.sin(a) * speed;
                spark.rot = Math.random() * Math.PI * 2;
                spark.rs = (Math.random() - 0.5) * 0.28;
                spark.s = (4 + Math.random() * 3) * this.scale;
                spark.a = 1;
                spark.f = 0.9;
            } else {
                spark = {
                    x, y,
                    vx: Math.cos(a) * speed,
                    vy: Math.sin(a) * speed,
                    rot: Math.random() * Math.PI * 2,
                    rs: (Math.random() - 0.5) * 0.28,
                    s: (4 + Math.random() * 3) * this.scale,
                    a: 1, f: 0.9
                };
            }
            this.sparks.push(spark);
        }
    }

    loop(now) {
        const deltaMs = Math.min(now - this.lastFrameTime, this.maxDeltaMs);
        this.lastFrameTime = now;
        const frameScale = (deltaMs / this.baseFrameMs) * this.speed;

        if (this.waves.length > 0 || this.sparks.length > 0 || this.trail.length > 0 || this.touchPointers.size > 0) {
            this.ctx.clearRect(0, 0, this.c.width, this.c.height);
            // 优化：减少全局合成模式的使用
            this.ctx.globalCompositeOperation = "lighter";

            // 渲染主鼠标拖尾
            this.renderTrail(this.trail, this.isDown, frameScale);

            // 渲染多指拖尾
            for (let [id, pointer] of this.touchPointers.entries()) {
                this.renderTrail(pointer.trail, pointer.isDown, frameScale);
                if (!pointer.isDown && pointer.trail.length === 0) {
                    this.touchPointers.delete(id);
                }
            }

        }

    renderTrail(trailArray, isPointerDown, frameScale) {
        for (let i = trailArray.length - 1; i >= 0; i--) {
            let t = trailArray[i];
            if (window.effectiveAlwaysTrail) {
                t.life -= 0.085 * frameScale;
            } else {
                t.life -= (isPointerDown ? 0.085 : 0.18) * frameScale;
            }
            if (t.life <= 0) trailArray.splice(i, 1);
        }

        if (trailArray.length > 1) {
            this.ctx.lineWidth = 5.0;
            this.ctx.shadowColor = `rgba(${this.color}, 0.6)`;
            this.ctx.shadowBlur = 3;
            this.ctx.shadowOffsetX = 0;
            this.ctx.shadowOffsetY = 0;

            const lastIdx = trailArray.length - 1;
            for (let i = 0; i < lastIdx; i++) {
                const alphaStart = i / lastIdx;
                const alphaEnd = (i + 1) / lastIdx;
                const a0 = trailArray[i];
                const a1 = trailArray[i + 1];

                const segGrad = this.ctx.createLinearGradient(a0.x, a0.y, a1.x, a1.y);
                segGrad.addColorStop(0, `rgba(${this.color}, ${alphaStart})`);
                segGrad.addColorStop(1, `rgba(${this.color}, ${alphaEnd})`);

                this.ctx.beginPath();
                this.ctx.moveTo(a0.x, a0.y);
                this.ctx.lineTo(a1.x, a1.y);
                this.ctx.strokeStyle = segGrad;
                this.ctx.stroke();
            }

            this.ctx.shadowColor = 'transparent';
        }
    }

            for (let i = this.waves.length - 1; i >= 0; i--) {
                let w = this.waves[i];
                w.life += frameScale;
                let progress = w.life / w.max;
                let ease = 1 - Math.pow(1 - Math.min(progress, 1), 3);
                w.r = 26 * this.scale * ease;
                let alpha = Math.max(0, 1 - progress);
                if (alpha > 0) {
                    this.ctx.beginPath();
                    this.ctx.arc(w.x, w.y, w.r, 0, Math.PI * 2);
                    this.ctx.fillStyle = `rgba(${this.color},${this.alpha(alpha)})`;
                    // 优化：减少阴影效果
                    this.ctx.fill();
                }
                
                let r = w.ring;
                r.life += frameScale;
                let rProg = Math.min(r.life / r.maxLife, 1);
                r.ang -= r.rs * frameScale;
                r.segs.forEach(seg => {
                    let shrink = Math.max(0, 1 - rProg);
                    let len = seg.len * shrink;
                    let start = r.ang + seg.off;
                    this.ctx.beginPath();
                    this.ctx.arc(w.x, w.y, w.r + 3 * this.scale, start, start + len);
                    this.ctx.lineWidth = 3.7;
                    this.ctx.strokeStyle = `rgba(245,248,252,${this.alpha(1 - rProg)})`;
                    // 减少阴影效果
                    this.ctx.stroke();
                });
                if (progress >= 1 && rProg >= 1) {
                    // 回收对象到对象池
                    this.wavePool.push(this.waves[i]);
                    this.waves.splice(i, 1);
                }
            }

            for (let i = this.sparks.length - 1; i >= 0; i--) {
                let s = this.sparks[i];
                s.x += s.vx * frameScale;
                s.y += s.vy * frameScale;
                s.vx *= Math.pow(s.f, frameScale);
                s.vy *= Math.pow(s.f, frameScale);
                s.rot += s.rs * frameScale;
                s.a -= 0.032 * frameScale;
                if (s.a <= 0) {
                    this.sparkPool.push(this.sparks[i]);
                    this.sparks.splice(i, 1);
                    continue;
                }
                
                this.ctx.save();
                this.ctx.translate(s.x, s.y);
                this.ctx.rotate(s.rot);
                this.ctx.beginPath();
                this.ctx.moveTo(0, -s.s);
                this.ctx.lineTo(s.s * 0.6, s.s * 0.6);
                this.ctx.lineTo(-s.s * 0.6, s.s * 0.6);
                this.ctx.fillStyle = `rgba(255,255,255,${this.alpha(s.a)})`;
                this.ctx.fill();
                this.ctx.restore();
            }
            this.ctx.globalCompositeOperation = "source-over";
        }
        requestAnimationFrame((nextNow) => this.loop(nextNow));
    }
}

window.spark = new MouseSpark();

// C# 通信接口

let lastBoomX = -1, lastBoomY = -1;
let lastBoomTime = 0; 
let lastMoveX = -1, lastMoveY = -1;

window.currentInputMode = "mouse";
window.enableAlwaysTrailEffect = false;
window.effectiveAlwaysTrail = false;
window.enableMultiTouch = false;

window.setInputContext = (mode, alwaysTrailEnabled, multiTouchEnabled) => {
    window.currentInputMode = mode === "touch" ? "touch" : "mouse";
    window.enableAlwaysTrailEffect = Boolean(alwaysTrailEnabled);
    window.enableMultiTouch = Boolean(multiTouchEnabled);
    window.effectiveAlwaysTrail = window.currentInputMode === "mouse" && window.enableAlwaysTrailEffect;
};

window.setInputContext("mouse", false, false);

// 接收 C# 传来的物理百分比 (0.0 ~ 1.0)，由前端根据真实的画布宽度自行计算
window.externalBoom = (percentX, percentY) => {
    const now = Date.now();
    if (percentX === lastBoomX && percentY === lastBoomY && (now - lastBoomTime) < 25) return;
    lastBoomX = percentX; lastBoomY = percentY; lastBoomTime = now;
    
    // 百分比乘以 WebView 当前真实的内部宽度
    let cx = percentX * window.innerWidth;
    let cy = percentY * window.innerHeight;
    window.dispatchEvent(new MouseEvent('mousedown', { clientX: cx, clientY: cy, bubbles: true }));
};

window.externalMove = (percentX, percentY) => {
    if (percentX === lastMoveX && percentY === lastMoveY) return;
    lastMoveX = percentX; lastMoveY = percentY;
    
    // 方法与上述相同
    let cx = percentX * window.innerWidth;
    let cy = percentY * window.innerHeight;
    window.dispatchEvent(new MouseEvent('mousemove', { clientX: cx, clientY: cy, bubbles: true }));
};
window.externalUp = () => {
    window.dispatchEvent(new MouseEvent('mouseup', { bubbles: true }));
};

// 多点触控接口
window.externalTouchDown = (pointerId, percentX, percentY) => {
    if (!window.spark || !window.enableMultiTouch) return;
    let cx = percentX * window.innerWidth;
    let cy = percentY * window.innerHeight;

    if (window.spark.touchPointers.size > 5) return; // 限制最多5指

    let pointer = window.spark.touchPointers.get(pointerId) || { trail: [], isDown: false, lastPos: null };
    pointer.isDown = true;
    pointer.lastPos = { x: cx, y: cy };
    window.spark.touchPointers.set(pointerId, pointer);

    window.spark.boom(cx, cy);
};

window.externalTouchMove = (pointerId, percentX, percentY) => {
    if (!window.spark || !window.enableMultiTouch) return;
    let pointer = window.spark.touchPointers.get(pointerId);
    if (!pointer || !pointer.isDown) return;

    let cx = percentX * window.innerWidth;
    let cy = percentY * window.innerHeight;

    pointer.trail.push({ x: cx, y: cy, life: 1 });
    if (pointer.trail.length > window.spark.maxTrail) pointer.trail.shift();
    pointer.lastPos = { x: cx, y: cy };
};

window.externalTouchUp = (pointerId) => {
    if (!window.spark) return;
    let pointer = window.spark.touchPointers.get(pointerId);
    if (pointer) pointer.isDown = false;
};

window.updateColor = (rgbString) => {
    if (window.spark) window.spark.color = rgbString;
};

window.updateEffectSettings = (scale, opacity, speed) => {
    if (!window.spark) return;
    window.spark.scale = Math.max(0.5, Math.min(3, Number(scale) || 1.5));
    window.spark.opacity = Math.max(0.1, Math.min(1, Number(opacity) || 1.0));
    window.spark.speed = Math.max(0.2, Math.min(3, Number(speed) || 1.0));
};
</script>
</body>
</html>
