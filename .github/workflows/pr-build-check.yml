name: PR Build Check

on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        shell: pwsh
        run: npm ci

      - name: Build frontend bundle
        shell: pwsh
        run: npm run build:web

      - name: Build Single EXE
        shell: pwsh
        run: |
          $RAW_VER = "${{ github.ref_name }}".TrimStart("v")
          
          if ("${{ github.event_name }}" -eq 'pull_request') { 
              $PR_NUM = "${{ github.event.pull_request.number }}"
              $RAW_VER = "0.0.0-pr.$PR_NUM" 
          }
          elseif ($RAW_VER -eq "main" -or [string]::IsNullOrWhiteSpace($RAW_VER)) { 
              $RAW_VER = "0.0.0-preview" 
          }
          
          Write-Host "----------------------------------------------"
          Write-Host "Targeting Version: $RAW_VER"
          Write-Host "----------------------------------------------"

          dotnet publish src/BASpark.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:Version=$RAW_VER `
            -o src/publish_single

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BASpark-Executable-Preview
          path: src/publish_single/
          retention-days: 7
